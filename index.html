<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Velouraagency</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* NAV */
nav{
  position:fixed;
  width:100%;
  display:flex;
  justify-content:space-between;
  padding:20px 40px;
  backdrop-filter:blur(20px);
  z-index:10;
}

nav h2{color:#00f5ff;}
nav a{color:white;margin-left:20px;text-decoration:none;}

/* HERO */
.hero{
  height:100vh;
  position:relative;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.hero video{
  position:absolute;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:-1;
}

.hero h1{
  font-size:4rem;
  background:linear-gradient(90deg,#00f5ff,#ff00ff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

.btn{
  margin-top:20px;
  padding:12px 30px;
  border:none;
  border-radius:30px;
  background:linear-gradient(45deg,#00f5ff,#ff00ff);
  cursor:pointer;
}

/* SECTIONS */
section{
  padding:120px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(50px);
  transition:1s;
}

section.show{
  opacity:1;
  transform:translateY(0);
}

/* PROJECTS */
.projects{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:20px;
  margin-top:30px;
}

.card{
  background:rgba(255,255,255,0.05);
  padding:30px;
  border-radius:20px;
  backdrop-filter:blur(15px);
  transition:0.4s;
}

.card:hover{
  transform:scale(1.1);
  box-shadow:0 0 30px #00f5ff;
}

/* CURSOR */
.cursor{
  position:fixed;
  width:20px;
  height:20px;
  border-radius:50%;
  background:#00f5ff;
  pointer-events:none;
  transform:translate(-50%,-50%);
  mix-blend-mode:difference;
}

/* AI CHAT */
.chat{
  position:fixed;
  bottom:20px;
  right:20px;
  width:260px;
  background:#111;
  padding:15px;
  border-radius:15px;
}

.chat input{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:8px;
}

/* CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
  z-index:-3;
}
</style>
</head>

<body>

<nav>
  <h2>Veloura</h2>
  <div>
    <a href="#home">Home</a>
    <a href="#projects">Projects</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero" id="home">
  <video autoplay muted loop>
    <source src="https://cdn.pixabay.com/vimeo/375309898/Abstract-Background-69848.mp4">
  </video>
  <div class="overlay"></div>

  <div>
    <h1>hi I'm Aditya</h1>
    <p>Ultra Premium Developer</p>
    <button class="btn">Hire Me</button>
  </div>
</section>

<!-- ABOUT -->
<section>
  <h2>About Me</h2>
  <p>I create cinematic, high-performance, and interactive digital experiences.</p>
</section>

<!-- PROJECTS -->
<section id="projects">
  <h2>Projects</h2>
  <div class="projects">
    <div class="card">3D UI</div>
    <div class="card">AI System</div>
    <div class="card">Automation</div>
  </div>
</section>

<!-- CONTACT -->
<section>
  <h2>Contact</h2>
  <p>adix99ff@gmail.com</p>
</section>

<!-- AI UI -->
<div class="chat">
  <b>AI Assistant</b>
  <input id="ai" placeholder="Ask something...">
</div>

<!-- CURSOR -->
<div class="cursor" id="cursor"></div>

<!-- 3D -->
<canvas id="bg"></canvas>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// CURSOR
const cursor = document.getElementById("cursor");

document.addEventListener("mousemove", e=>{
  cursor.style.left = e.clientX + "px";
  cursor.style.top = e.clientY + "px";
});

// SCROLL ANIMATION
const sections = document.querySelectorAll("section");

window.addEventListener("scroll", ()=>{
  sections.forEach(sec=>{
    if(sec.getBoundingClientRect().top < window.innerHeight - 100){
      sec.classList.add("show");
    }
  });
});

// THREE JS
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({canvas:document.getElementById("bg"),alpha:true});
renderer.setSize(innerWidth, innerHeight);

const geo = new THREE.TorusKnotGeometry(8,2,100,16);
const mat = new THREE.MeshBasicMaterial({color:0xff00ff, wireframe:true});

const obj = new THREE.Mesh(geo, mat);
scene.add(obj);

camera.position.z = 25;

function animate(){
  requestAnimationFrame(animate);
  obj.rotation.x += 0.003;
  obj.rotation.y += 0.004;
  renderer.render(scene,camera);
}
animate();

// AI UI (placeholder)
document.getElementById("ai").addEventListener("keypress", e=>{
  if(e.key === "Enter"){
    alert("Connect real AI API to make this intelligent 🔥");
    e.target.value="";
  }
});
</script>

</body>
</html>
